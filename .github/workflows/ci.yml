name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Check backend formatting
        working-directory: backend
        run: python -m ruff format --check src tests migrations

      - name: Lint backend
        run: make lint

      - name: Test backend
        run: make test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.7"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Initialize dev environment
        working-directory: infra/environments/dev
        run: terraform init -backend=false

      - name: Validate dev environment
        working-directory: infra/environments/dev
        run: terraform validate

  terraform-module-tests:
    name: Terraform module tests (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - infra/modules/api_http
          - infra/modules/cloudwatch_alarms
          - infra/modules/cognito
          - infra/modules/frontend_hosting
          - infra/modules/lambda_backend
          - infra/modules/network
          - infra/modules/reminder_scheduler
          - infra/modules/ses_email_foundation

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.7"

      - name: Initialize module
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Test module
        working-directory: ${{ matrix.module }}
        run: terraform test
