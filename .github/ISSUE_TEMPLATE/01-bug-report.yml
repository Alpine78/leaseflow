name: Bug report
description: Report a reproducible problem in the backend, infrastructure, or docs.
title: "[Bug]: "
labels:
  - type:bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please include enough detail for someone else to reproduce the problem.
        If this looks like a security vulnerability, do not open a public issue. Follow the instructions in `SECURITY.md` instead.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of LeaseFlow is affected?
      options:
        - backend
        - infra
        - docs
        - ci/github
        - unsure
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest reliable reproduction steps.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste logs, traceback, or CI output if available. Remove secrets before submitting.
      render: shell
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where did you see this?
      placeholder: local Windows dev, GitHub Actions, AWS dev, etc.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues first.
          required: true
        - label: I removed secrets and sensitive tenant data from logs and screenshots.
          required: true
